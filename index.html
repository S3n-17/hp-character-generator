<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carat ID Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="logo"></div>
    <h1>HARRY POTTER CHARACTER GENERATOR</h1>
    <div id="info">
        <div id="intro">
            Hello witches and wizards! Step into the wizarding world! Enter your name and let magic decide your Hogwarts identity…
        </div>
        <div id="form">
            <form>
                <label for="name" id="name-label">Enter your name:</label>
                <input type="text" id="name" name="name" required>
            </form>
        </div>
    </div>
    <div id="img"></div>
    <button id="generate-btn">Generate my character</button>
    <script src="app.js"></script>
</body>

</html>
